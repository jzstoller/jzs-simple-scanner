<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCV Load Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      background: #f5f5f5;
    }
    .box {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .status {
      padding: 12px;
      border-radius: 6px;
      background: #f0f0f0;
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: monospace;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>OpenCV.js Load Test</h1>
    <button id="testBtn" disabled>Run cv.Mat Test</button>
    <div id="status" class="status">Starting…</div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const testBtn = document.getElementById('testBtn');
    let cvReady = false;

    function setStatus(msg) {
      statusEl.textContent = msg;
      console.log(msg);
    }

    window.Module = {
      onRuntimeInitialized() {
        cvReady = true;
        setStatus('✅ OpenCV runtime initialized successfully');
        testBtn.disabled = false;
      },
      printErr(text) {
        console.error('OpenCV stderr:', text);
      },
      onAbort(err) {
        console.error('OpenCV abort:', err);
        setStatus('❌ OpenCV aborted: ' + err);
      }
    };

    testBtn.addEventListener('click', () => {
      if (!cvReady || typeof cv === 'undefined') {
        setStatus('❌ cv is not ready');
        return;
      }

      try {
        const m = new cv.Mat(2, 2, cv.CV_8UC1);
        setStatus('✅ cv.Mat works\nrows=' + m.rows + ' cols=' + m.cols);
        m.delete();
      } catch (err) {
        console.error(err);
        setStatus('❌ cv exists but test failed: ' + err.message);
      }
    });

    window.addEventListener('error', (e) => {
      console.error('Window error:', e.message, e.error);
    });

    window.addEventListener('load', () => {
      setStatus('Loading OpenCV script...');
      const script = document.createElement('script');
      script.src = 'https://docs.opencv.org/4.x/opencv.js';
      script.async = false;

      script.onload = () => {
        setStatus('Script loaded. Waiting for runtime initialization...');
      };

      script.onerror = () => {
        setStatus('❌ Failed to load opencv.js script');
      };

      document.body.appendChild(script);
    });
  </script>
</body>
</html>
