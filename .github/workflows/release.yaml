name: Release Obsidian Plugin

on:
  push:
    tags:
      - '*.*.*'
      - '*.*.*-*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "main.js" ]; then
            echo "ERROR: main.js not found. Build likely failed."
            exit 1
          fi

      - name: Create ZIP
        run: |
          mkdir dist
          cp manifest.json main.js styles.css dist/ 2>/dev/null || true
          cd dist
          zip -r ../plugin.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: plugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
